<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 12</title>
</head>
<body>
  <h3>Lesson 12a</h3>
  <style>
    .cl{
      display: grid;
      justify-content: center;
      grid-template-columns: 200px 75px;
    }
    .grd1{
      background-color: rgb(158, 212, 233);
    }
    .grid2{
      background-color: rgb(248, 153, 143);
    }
  </style>
  <div class="cl">
    <div class="grd1">200px</div>
    <div class="grid2">75px</div>
  </div>

  <h3>Lesson 12b</h3>
  <style>
    .cl1{
      display: grid;
      justify-content: center;
      grid-template-columns:75px 300px 75px;
    }
    .grid3{
      background-color:  rgb(158, 212, 233);
    }
    .grid2{
      background-color: rgb(248, 153, 143);
    }
  </style>
    <div class="cl1">
      <div class="grid3">item1</div>
      <div class="grid2">item2</div>
      <div class="grid3">item3</div>
    </div>

    <h3>Lesson 12c</h3>
    <style>
      .k3{
        display: grid;
        grid-template-rows: 20px 10px;
        grid-template-columns: 50px 50px 50px 50px;
        gap: 75px;
      }
      .grid5{
        background-color: rgb(248, 153, 143);
      }
    </style>
    <div class="k3">
      <div class="grid5">item1</div>
      <div class="grid5">item2</div>
      <div class="grid5">item3</div>
      <div class="grid5">item4</div>
    </div>

    <h3>Lesson 12d</h3>
    <style>
      .k4{
        display: grid;
        grid-template-rows: 20px 10px;
        grid-template-columns: 50px 50px 50px 50px;
        gap: 500px;
        flex-direction: row;
        justify-content: space-between;
        padding: 20px solid black;
      }
      .grid7{
        background-color: rgb(248, 153, 143);
      }
    </style>
    <div class="k4">
      <div class="grid7">item1</div>
      <div class="grid7">item2</div>

</body>
</html>
